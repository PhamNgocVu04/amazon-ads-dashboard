<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Amazon Ads Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#242836;--text:#e4e4e7;--text2:#a1a1aa;--text3:#71717a;--border:#2e3348;--blue:#6366f1;--red:#ef4444;--green:#10b981}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-container{width:100%;max-width:400px;padding:20px}
.logo{text-align:center;margin-bottom:32px}
.logo h1{font-size:24px;font-weight:700;background:linear-gradient(135deg,var(--blue),#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{color:var(--text3);font-size:13px;margin-top:4px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px}
.card h2{font-size:18px;font-weight:600;margin-bottom:4px}
.card .sub{font-size:13px;color:var(--text3);margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.field input::placeholder{color:var(--text3)}
.remember{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:13px;color:var(--text2)}
.remember input{accent-color:var(--blue)}
.btn-login{width:100%;padding:12px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-login:hover{background:#4f46e5;transform:translateY(-1px);box-shadow:0 4px 12px rgba(99,102,241,.3)}
.btn-login:active{transform:translateY(0)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}
.error{background:#7f1d1d;color:#fca5a5;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;border:1px solid #991b1b}
.divider{text-align:center;margin:20px 0;color:var(--text3);font-size:12px;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border)}
.divider::before{left:0}
.divider::after{right:0}
.btn-register{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-register:hover{border-color:var(--text3);color:var(--text)}
.footer{text-align:center;margin-top:24px;font-size:11px;color:var(--text3)}

/* Register form */
.register-form{display:none}
.back-link{font-size:13px;color:var(--blue);cursor:pointer;margin-bottom:16px;display:inline-block}
.back-link:hover{text-decoration:underline}
.success{background:#064e3b;color:#6ee7b7;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;border:1px solid #065f46}
</style>
</head>
<body>

<div class="login-container">
  <div class="logo">
    <h1>Amazon Ads Dashboard</h1>
    <p>Campaign management system</p>
  </div>

  <!-- Login Form -->
  <div class="card login-form" id="loginForm">
    <h2>Welcome back</h2>
    <div class="sub">Sign in to your account</div>
    <div class="error" id="loginError"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@company.com" autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="remember">
      <input type="checkbox" id="remember" checked> <label for="remember">Remember me</label>
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign in</button>
    <div class="divider">or</div>
    <button class="btn-register" onclick="showRegister()">Create new account</button>
  </div>

  <!-- Register Form -->
  <div class="card register-form" id="registerForm">
    <span class="back-link" onclick="showLogin()">← Back to login</span>
    <h2>Create account</h2>
    <div class="sub">Register a new account</div>
    <div class="error" id="registerError"></div>
    <div class="success" id="registerSuccess"></div>
    <div class="field">
      <label>Full name</label>
      <input type="text" id="regName" placeholder="Your name">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="you@company.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="Min 6 characters">
    </div>
    <div class="field">
      <label>Confirm password</label>
      <input type="password" id="regPasswordConfirm" placeholder="Re-enter password" onkeydown="if(event.key==='Enter')doRegister()">
    </div>
    <button class="btn-login" id="regBtn" onclick="doRegister()">Create account</button>
  </div>

  <div class="footer">Powered by Amazon Ads System</div>
</div>

<script>
// Check if already logged in
fetch('/auth/check', {credentials:'include'}).then(r => r.json()).then(d => {
  if (d.authenticated) window.location.href = '/dashboard.html';
}).catch(() => {});

function showRegister() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('registerForm').style.display = 'block';
}
function showLogin() {
  document.getElementById('registerForm').style.display = 'none';
  document.getElementById('loginForm').style.display = 'block';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const remember = document.getElementById('remember').checked;
  const err = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  if (!email || !password) { err.textContent = 'Please enter email and password'; err.style.display = 'block'; return; }

  btn.disabled = true; btn.textContent = 'Signing in...';
  err.style.display = 'none';

  try {
    // Get CSRF cookie first
    await fetch('/sanctum/csrf-cookie', {credentials:'include'});
    const token = document.cookie.match(/XSRF-TOKEN=([^;]+)/)?.[1];

    const res = await fetch('/auth/login', {
      method: 'POST',
      credentials: 'include',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json',
        'X-XSRF-TOKEN': token ? decodeURIComponent(token) : '',
      },
      body: JSON.stringify({ email, password, remember })
    });
    const data = await res.json();
    if (res.ok && data.status === 'success') {
      window.location.href = '/dashboard.html';
    } else {
      err.textContent = data.message || 'Login failed';
      err.style.display = 'block';
    }
  } catch (e) {
    err.textContent = 'Connection error: ' + e.message;
    err.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Sign in';
}

async function doRegister() {
  const name = document.getElementById('regName').value;
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  const password_confirmation = document.getElementById('regPasswordConfirm').value;
  const err = document.getElementById('registerError');
  const suc = document.getElementById('registerSuccess');
  const btn = document.getElementById('regBtn');

  if (!name || !email || !password) { err.textContent = 'Please fill all fields'; err.style.display = 'block'; return; }
  if (password !== password_confirmation) { err.textContent = 'Passwords do not match'; err.style.display = 'block'; return; }
  if (password.length < 6) { err.textContent = 'Password must be at least 6 characters'; err.style.display = 'block'; return; }

  btn.disabled = true; btn.textContent = 'Creating...';
  err.style.display = 'none'; suc.style.display = 'none';

  try {
    await fetch('/sanctum/csrf-cookie', {credentials:'include'});
    const token = document.cookie.match(/XSRF-TOKEN=([^;]+)/)?.[1];

    const res = await fetch('/auth/register', {
      method: 'POST',
      credentials: 'include',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json',
        'X-XSRF-TOKEN': token ? decodeURIComponent(token) : '',
      },
      body: JSON.stringify({ name, email, password, password_confirmation })
    });
    const data = await res.json();
    if (res.ok && data.status === 'success') {
      window.location.href = '/dashboard.html';
    } else {
      err.textContent = data.message || JSON.stringify(data.errors || 'Register failed');
      err.style.display = 'block';
    }
  } catch (e) {
    err.textContent = 'Connection error: ' + e.message;
    err.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Create account';
}
</script>
</body>
</html>
